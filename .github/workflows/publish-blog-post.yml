name: Daily Blog Publisher

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

env:
  TZ: Europe/Lisbon

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Config git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Move next due scheduled post
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "Hoje é: $TODAY"

          SCHEDULED_DIR="src/scheduled"
          PUBLISHED_DIR="src/posts"

          MATCHES=$(
            find "$SCHEDULED_DIR" -mindepth 1 -maxdepth 1 -type d | sort | while read -r DIR; do
              BASENAME=$(basename "$DIR")
              PREFIX=${BASENAME:0:10}

              if [[ "$PREFIX" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && { [[ "$PREFIX" < "$TODAY" ]] || [[ "$PREFIX" == "$TODAY" ]]; }; then
                echo "$DIR"
                break
              fi
            done
          )

          if [ -z "$MATCHES" ]; then
            echo "Não há posts agendados com data inferior ou igual a hoje."
            echo "Nada para publicar."
            exit 0
          fi

          echo "Publicação selecionada:"
          echo "$MATCHES"

          for DIR in $MATCHES; do
            BASENAME=$(basename "$DIR")
            echo "A mover $DIR -> $PUBLISHED_DIR/$BASENAME"
            mv "$DIR" "$PUBLISHED_DIR/$BASENAME"
          done

      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.cjs

      - name: Validate sitemap uses canonical www domain
        run: |
          if [ ! -f "public/sitemap.xml" ]; then
            echo "❌ public/sitemap.xml não existe."
            exit 1
          fi

          echo "🔎 A verificar domínio no sitemap..."
          if grep -q "<loc>https://linktopics.me" public/sitemap.xml; then
            echo "❌ Encontrado URL sem www no sitemap. Isto vai causar 'Non-canonical page in sitemap'."
            echo "➡️ Corrige BASE_URL no scripts/generate-sitemap.cjs para https://www.linktopics.me"
            exit 1
          fi

          if ! grep -q "<loc>https://www.linktopics.me" public/sitemap.xml; then
            echo "❌ Não encontrei URLs com www no sitemap. Algo está errado."
            exit 1
          fi

          echo "✅ Sitemap OK: usa www."

      - name: Commit and push changes
        run: |
          git status

          if git diff --quiet; then
            echo "Sem alterações para commitar."
            exit 0
          fi

          # Só commitar o que interessa: posts publicados + sitemap
          git add src/posts public/sitemap.xml

          # (Opcional) também podes adicionar robots.txt se ele for gerado/alterado:
          # git add public/robots.txt

          git commit -m "Publish blog posts and update sitemap"
          git push
